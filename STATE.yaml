  - "2026-04-27 — Two-item /proceed-with-claude-recommendation pass closed end-to-end (commits 30ee170 + 48a5bb2 + this entry; 2 Railway deploys both SUCCESS). Item 1 — deck staleness fixed on hydrax-context: docs/demo/site/{deck,canton-interview}.html resynced from canonical docs/demo/{canton-homework-deck,canton-interview}.html, deployed via `cd docs/demo/site && railway up --path-as-root . --service hydrax-context --detach` (build 54545f27, status SUCCESS, ~30s build). Live verification — GET https://hydrax-context-production.up.railway.app/deck returned HTTP 200, 225514 bytes (matches canonical), counter `/ 18` (was `/ 14`); GET /interview returned HTTP 200, 155300 bytes, title `Canton Network — Building Above It`. Item 2 — market-data-svc FAILED → SUCCESS: root cause was build-time `Dockerfile 'Dockerfile' does not exist` from a 2026-04-26T07:34:48Z redeploy that uploaded the wrong archive root (same railway-up cwd-vs-path-as-root failure mode as the 2026-04-26 hydrax-context past-mistake). Fix — `cd services/market-data-svc && railway up --path-as-root . --service market-data-svc --detach` (build a9ce6fb9, status SUCCESS). Live verification — GET https://market-data-svc-production.up.railway.app/healthz returned `{\"service\":\"market-data-svc\",\"status\":\"ok\"}`; GET /v1/fx/EUR/USD returned `{\"base\":\"EUR\",\"quote\":\"USD\",\"rate\":1.17805,...}` confirming market-data-hub upstream is reachable. New rule emerging: 2-of-2 redeploys in 24h hit the same `railway up` subdir-vs-path-as-root pitfall. The CLAUDE.md past-mistake calls it out for hydrax-context but the same trap applies to every Dockerfile-rooted Go service — should be pinned at the service-config layer (Railway dashboard `rootDirectory` field) not just remembered at command-invocation time. Pinning rootDirectory per Railway service is a separate slice and stays out of scope here. Out-of-scope honored — no Railway service config change, no destructive action. Working-tree changes: 30ee170 (2 deck