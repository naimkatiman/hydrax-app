summary: Clickable breadcrumb segments — panel and item crumbs become interactive (role=button, tabindex=0) whenever a drill-down is active; click or Enter/Space on either triggers deselectActivePanel() which toggles the current select*() to clear the selection.
current_focus:
  - Toolbar eyebrow is now a <nav id="breadcrumbTrail"> breadcrumb instead of the static "Dashboard view" label
  - renderBreadcrumb() always renders "Dashboard view > <Panel name>" and appends "> <Selected item>" when a drill-down is active
  - Panel and item crumbs toggle is-interactive (with role=button, tabindex=0, aria-label) whenever a selection exists
  - breadcrumbTrail has click + keydown (Enter/Space) event delegation calling deselectActivePanel()
  - deselectActivePanel() toggles the current select*() for the active panel, clearing the selection and returning focus to the lane
  - CSS .is-interactive adds cursor, accent-soft hover/focus background, and focus-visible outline for keyboard a11y
  - Twenty-one workbench features now fully interactive: ... , Contextual breadcrumb trail, Clickable breadcrumb segments
